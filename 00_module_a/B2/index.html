<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>B2 圖片馬賽克</title>
</head>
<body>
    <h2>圖片馬賽克處理</h2>
    上傳圖片: <input type="file" id="upload" accept="image/*"><br><br>
    區塊大小 (cell_size): <input type="number" id="cellSize" value="50" min="1"><br><br>
    <button onclick="processMosaic()">產生馬賽克</button>
    <br><br>
    <canvas id="canvas"></canvas>
    <br>
    <a href="../index.html">返回</a>

    <script>
        function processMosaic() {
            const file = document.getElementById('upload').files[0];
            const sizeInput = document.getElementById('cellSize').value;
            const size = sizeInput ? parseInt(sizeInput) : 50;
            if (!file) { alert('請選擇圖片'); return; }

            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // Loop through building blocks
                for (let y = 0; y < canvas.height; y += size) {
                    for (let x = 0; x < canvas.width; x += size) {
                        let r = 0, g = 0, b = 0, count = 0;

                        // Calculate average color within the cell
                        for (let cy = 0; cy < size; cy++) {
                            for (let cx = 0; cx < size; cx++) {
                                const px = x + cx;
                                const py = y + cy;
                                if (px < canvas.width && py < canvas.height) {
                                    const idx = (py * canvas.width + px) * 4;
                                    r += data[idx]; g += data[idx+1]; b += data[idx+2];
                                    count++;
                                }
                            }
                        }
                        
                        // Fill cell with average color
                        ctx.fillStyle = `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
                        ctx.fillRect(x, y, size, size);
                    }
                }
            };
            img.src = URL.createObjectURL(file);
        }
    </script>
</body>
</html>
